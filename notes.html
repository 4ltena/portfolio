<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes | Portfolio</title>
    <meta name="description" content="A space for thoughts, study notes, and research by Altena.">
    
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
    <link rel="stylesheet" href="style.css">

    <!-- JS -->
    <script src="js/main.js"></script>
    <script>
        // System Greeting: Initial Contact
        console.log("%c[SYSTEM] Log Access Authorized. Identity: Guest. Reading encrypted notes...", "color: #00f2ff; font-weight: bold; background: #111; padding: 5px 10px; border-radius: 4px;");
    </script>
</head>

<body>
    <header class="header glass">
        <div class="header-container">
            <a href="index.html" class="logo" id="header-logo">
                <span class="slash-icon">//</span>Alt<span class="ena">ena</span>
            </a>
            <button class="hamburger" id="mobile-menu-toggle" aria-label="Toggle navigation">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav class="nav">
                <ul>
                    <li><a href="index.html#skills">Skills</a></li>
                    <li><a href="index.html#timeline">Timeline</a></li>
                    <li><a href="myworks.html">Works</a></li>
                    <li><a href="notes.html">Notes</a></li>
                    <li><a href="index.html#profile">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero small-hero">
            <div class="hero-content">
                <div class="hero-placeholder"></div>
                <div class="hero-text">
                    <h1 class="reveal">System <span class="accent-blue">Logs</span></h1>
                    <p class="reveal delay-1">Study, Books & Fragments</p>
                </div>
            </div>
        </section>

        <div class="content-wrapper">
            <section class="notes-section reveal">
                <h2 class="section-title">
                    <div class="title-wrapper">
                        <span class="sub-title">SYSTEM LOGS</span>
                        <span class="main-title">Knowledge Base</span>
                    </div>
                </h2>

                <!-- Search Control -->
                <div class="search-container reveal">
                    <div class="search-box glass">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="notes-search" placeholder="Search logs by title, tag or content..." autocomplete="off">
                        <button id="clear-search" class="mono">&times;</button>
                    </div>
                    <div class="search-stats mono">
                        Showing <span id="visible-notes-count">4</span> / <span id="total-notes-count">4</span> entries
                    </div>
                </div>

                <!-- Tag Cloud -->
                <div id="tag-cloud" class="tag-cloud-container reveal">
                    <!-- Dynamic Tags will be injected here -->
                </div>

                <div class="note-grid">
                    <!-- New Note: Blender Day 5 -->
                    <a href="notes/blender-day-5/index.html" class="note-card glass">
                        <div class="note-meta">
                            <span class="note-date">2026/04/11</span>
                            <div class="hashtags">
                                <span class="tag-link">#Blender</span>
                                <span class="tag-link">#Study</span>
                                <span class="tag-link">#Blender生活1週目</span>
                            </div>
                        </div>
                        <h3>Blender生活5日目</h3>
                        <p class="note-excerpt">バス停のモデリングに挑戦。成果物はWorksページに掲載。</p>
                    </a>

                </div>

                <div class="back-home reveal">
                    <a href="index.html" class="btn-outline">Back to Home</a>
                </div>
            </section>
        </div>
    </main>

    <footer class="glass-top">
        <div class="footer-content">
            <p class="mono">&copy; 2026 Altena. All rights reserved.</p>
        </div>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('notes-search');
            const clearBtn = document.getElementById('clear-search');
            const noteCards = document.querySelectorAll('.note-card');
            const visibleCountEl = document.getElementById('visible-notes-count');
            const totalCountEl = document.getElementById('total-notes-count');

            const filterNotes = (query) => {
                query = query.toLowerCase().trim();
                let visibleCount = 0;

                noteCards.forEach(card => {
                    const title = card.querySelector('h3').textContent.toLowerCase();
                    const hashtags = Array.from(card.querySelectorAll('.tag-link')).map(t => t.textContent.toLowerCase()).join(' ');
                    const excerpt = card.querySelector('.note-excerpt').textContent.toLowerCase();

                    if (title.includes(query) || hashtags.includes(query) || excerpt.includes(query)) {
                        card.style.display = 'flex';
                        visibleCount++;
                    } else {
                        card.style.display = 'none';
                    }
                });

                visibleCountEl.textContent = visibleCount;
                totalCountEl.textContent = noteCards.length;
                
                if (query.length > 0) {
                    clearBtn.style.opacity = '1';
                } else {
                    clearBtn.style.opacity = '0';
                }

                updateTagCloudActiveState(query);
            };

            const updateTagCloudActiveState = (query) => {
                document.querySelectorAll('.tag-cloud-chip').forEach(chip => {
                    if (chip.getAttribute('data-tag').toLowerCase() === query.toLowerCase()) {
                        chip.classList.add('active');
                    } else {
                        chip.classList.remove('active');
                    }
                });
            };

            const initTagCloud = () => {
                const tagCloud = document.getElementById('tag-cloud');
                const tagCounts = {};

                noteCards.forEach(card => {
                    card.querySelectorAll('.tag-link').forEach(tagEl => {
                        const tag = tagEl.textContent.trim();
                        if (tag.startsWith('#')) {
                            tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                        }
                    });
                });

                // Sort tags by frequency
                const sortedTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);

                tagCloud.innerHTML = sortedTags.map(([tag, count]) => `
                    <div class="tag-cloud-chip" data-tag="${tag}">${tag}(${count})</div>
                `).join('');

                // Add event listeners to chips
                document.querySelectorAll('.tag-cloud-chip').forEach(chip => {
                    chip.addEventListener('click', () => {
                        const tag = chip.getAttribute('data-tag');
                        if (searchInput.value === tag) {
                            searchInput.value = '';
                            filterNotes('');
                        } else {
                            searchInput.value = tag;
                            filterNotes(tag);
                        }
                    });
                });
            };

            searchInput.addEventListener('input', (e) => {
                filterNotes(e.target.value);
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                filterNotes('');
                searchInput.focus();
            });

            // Hashtag Click Event (Inline tags)
            document.querySelectorAll('.tag-link').forEach(tag => {
                tag.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const tagText = tag.textContent;
                    searchInput.value = tagText;
                    filterNotes(tagText);
                });
            });

            // Init Tag Cloud
            initTagCloud();

            // Handle URL Search Param
            const urlParams = new URLSearchParams(window.location.search);
            const searchQuery = urlParams.get('search');
            if (searchQuery) {
                searchInput.value = searchQuery;
                filterNotes(searchQuery);
            } else {
                totalCountEl.textContent = noteCards.length;
                visibleCountEl.textContent = noteCards.length;
            }
        });
    </script>
</body>

</html>
